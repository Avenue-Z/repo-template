name: secret-scan

on:
  pull_request:
  push:
    branches: [dev, staging, main]

# This job only reads the tree and reports a check — it never writes to the repo, so it does
# not get a token that can. Without this block the job inherits whatever the repo/org default
# GITHUB_TOKEN scope happens to be, which on many orgs is still read-write.
permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history, for two reasons: the push path scans all of it, and the PR path needs
          # origin/<base> present locally to diff against. fetch-depth: 0 makes actions/checkout
          # fetch every branch, so origin/${BASE_REF} resolves without an extra fetch.
          fetch-depth: 0

      - name: install gitleaks
        run: |
          set -euo pipefail
          # Keep this version in lockstep with the gitleaks rev in .pre-commit-config.yaml.
          # template-tests/test_secret_scan.sh asserts they match: a drifted pair means the
          # hook a developer runs locally is not the scanner that gates their PR.
          GITLEAKS_VERSION="8.21.2"
          ASSET="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          # --fail is load-bearing: without it curl exits 0 on a 404 and writes the HTML error
          # page to disk under the asset's name, and the real failure only surfaces later as a
          # baffling tar or checksum error.
          # Download under the ASSET name: checksums.txt lists that exact filename, and
          # `sha256sum --ignore-missing` verifies NOTHING (and errors) if it is not on disk.
          curl --fail -sSLo "${ASSET}" "${BASE_URL}/${ASSET}"
          curl --fail -sSLo checksums.txt "${BASE_URL}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          sha256sum --ignore-missing -c checksums.txt
          tar -xzf "${ASSET}" gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: gitleaks detect
        env:
          # Via env, never interpolated into the script body: a ref name is attacker-influenced
          # input, and `${{ }}` inside `run:` is textual substitution, not a shell variable.
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          # --exit-code 1 IS the control. Without it gitleaks prints the leak and exits 0,
          # and this required check goes green on a PR carrying a live credential.
          #
          # SCOPE IS EQUALLY LOAD-BEARING. `gitleaks detect` with no --log-opts scans EVERY
          # commit in the repo, not the change under review. So one secret committed once — even
          # one long since deleted and rotated — fails EVERY subsequent PR, forever, however
          # innocent. The repo becomes permanently unmergeable, and rotating the key (the remedy
          # SECURITY.md prescribes) does NOT turn the check green; only rewriting history does.
          #
          # So the two events get the scope each one actually wants:
          #   pull_request -> scan exactly the commits this PR adds on top of its base. A PR is
          #                   answerable for what it introduces, not for the repo's past.
          #   push         -> scan the full history. A repo-wide audit belongs on the protected
          #                   branch, where a finding is real news and blocks nothing that a
          #                   contributor cannot act on.
          if [ -n "${BASE_REF:-}" ]; then
            echo "pull_request: scanning the commits this PR adds on top of origin/${BASE_REF}"
            gitleaks detect --source . --redact --verbose --exit-code 1 \
              --log-opts "origin/${BASE_REF}..HEAD"
          else
            echo "push: scanning the full history"
            gitleaks detect --source . --redact --verbose --exit-code 1
          fi
