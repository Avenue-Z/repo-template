name: ci

on:
  pull_request:
  push:
    branches: [dev, staging, main]

# This job builds and tests; it never writes to the repo. Without this block it inherits
# whatever the repo/org default GITHUB_TOKEN scope happens to be, which is often read-write.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
