name: ci

on:
  pull_request:
  push:
    branches: [dev, staging, main]

# This job builds and tests; it never writes to the repo. Without this block it inherits
# whatever the repo/org default GITHUB_TOKEN scope happens to be, which is often read-write.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
