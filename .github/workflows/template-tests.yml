name: template-tests

# THIS WORKFLOW BELONGS TO THE TEMPLATE ITSELF AND MUST NOT SHIP TO A GENERATED REPO.
#
# scripts/init-repo.sh deletes BOTH template-tests/ and this file. It has to: the suite tests the
# TEMPLATE's premises, two of which INVERT the moment ci.yml exists (test_rulesets.sh and
# test_apply_rulesets.sh assert "the core has no ci.yml"). A generated repo that kept this workflow
# would run a directory that no longer exists — and if `template-tests` were ever a required check
# there, it would never report and hang every PR PENDING FOREVER.
#
# That is why `template-tests` is added to the required checks CONDITIONALLY, by
# scripts/apply-rulesets.sh, only when this file is actually present — the same guard that already
# protects the `ci` context. template-tests/test_init_repo.sh asserts a generated repo carries
# neither this file nor the suite.

on:
  pull_request:
  push:
    branches: [dev, staging, main]

# Read-only. This job runs a bash suite and reports a check; it never writes to the repo.
permissions:
  contents: read

jobs:
  template-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # jq is a hard dependency of apply-rulesets.sh / apply-org-ruleset.sh, and several suites
      # parse JSON with it. gh and python3 are preinstalled on ubuntu-latest; jq is too, but assert
      # it rather than assume — a suite that dies on a missing tool reports as a code failure.
      - name: check the tools the suite needs
        run: |
          set -euo pipefail
          for t in jq gh python3 bash; do
            command -v "$t" >/dev/null || { echo "::error::$t is required by the suite but is not installed"; exit 1; }
            echo "ok: $t"
          done

      - name: run the template's own test suite
        env:
          # Several suites drive a fake `gh` on PATH. Two do NOT: test_init_repo.sh deliberately
          # uses an INVALID token to prove a 401 is not silently treated as "team absent", and
          # test_apply_rulesets.sh drives the real gh against the real org. The latter needs
          # org-read, which a repo-scoped GITHUB_TOKEN does not have — lib.sh's have_org_access
          # detects that and SKIPS those checks loudly rather than failing the run.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          failed=0
          for t in template-tests/test_*.sh; do
            echo "::group::$(basename "$t")"
            if bash "$t"; then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::error::$(basename "$t") FAILED"
              failed=1
            fi
          done
          [ "$failed" -eq 0 ] || exit 1
          echo "all suites passed"
